services:
  app:
    build: .
    container_name: deen_shop_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: "${APP_SECRET:?Set APP_SECRET before deployment}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-deenshop}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD before deployment}@database:5432/${POSTGRES_DB:-deenshop}?serverVersion=16&charset=utf8"
      MAILER_DSN: "${MAILER_DSN:-null://null}"
      DEFAULT_URI: "${DEFAULT_URI:-https://example.com}"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - uploads_data:/var/www/html/public/uploads

  database:
    image: postgres:16-alpine
    container_name: deen_shop_database
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-deenshop}"
      POSTGRES_USER: "${POSTGRES_USER:-deenshop}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD before deployment}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deenshop} -d ${POSTGRES_DB:-deenshop}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  uploads_data:
  postgres_data:
