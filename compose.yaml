services:
  mysql:
    image: 'mysql:8.4'
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ecommerce}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ecommerce}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_USER: ${MYSQL_USER:-ecommerce}
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
